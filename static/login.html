<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <div class="container">
    <div class="logo-section">
      <img src="images/logo.png" alt="Labtech">
    </div>
    <div class="login-section">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="input-group">
          <label for="username">Usuário:</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="input-group">
          <label for="password">Senha:</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="login-button">Entrar</button>
        <div class="links">
          <a href="#">Esqueceu a senha?</a> | <a href="cadastro.html">Criar conta</a>
        </div>
        <p class="message" id="msg"></p>
      </form>
    </div>
  </div>

  <script>
    //obtendo informações do formulário de login
    const form = document.getElementById('loginForm')
    const msg = document.getElementById('msg')

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        //criando variáveis para verificação
        const username = form.username.value;
        const password = form.password.value;

        try {
            //envia os dados para a função /login no servidor
            const response = await fetch('/login',  {
                method: 'POST',
                headers: {'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password})
            });

            const data = await response.json();

            //mensagem de sucesso e redirecionamento para login
            if (response.ok) {
                msg.textContent = "Login Realizado com sucesso.";
                msg.style.color = "green";
                setTimeout(() => window.location.href = "/inicio.html", 1000);
            
            //mensagem de erro
            }else {
                msg.textContent = (data.error) || "Credenciais inválidas."
                msg.style.color = "red";
            }

        }catch (err) {
            msg.textContent = "Erro de conexão com o servidor."
            msg.style.color = "red";
        }
    });

  </script>

</body>
</html>
