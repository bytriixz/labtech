<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro</title>
</head>
<body>
    <div class="container">
    <div class="logo-section">
      <img src="images/logo.png" alt="Logo Labtech">
    </div>
    <div class="form-section">
      <h2>Criar Conta</h2>
      <form id="cadastroForm">
        <div class="input-group">
          <label for="fullname">Nome Completo:</label>
          <input type="text" id="fullname" name="fullname" required>
        </div>
        <div class="input-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="input-group">
          <label for="username">Usuário:</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="input-group">
          <label for="password">Senha:</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="input-group">
          <label for="confirm_password">Confirmar Senha:</label>
          <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit" class="submit-button">Criar Conta</button>
        <div class="links">
          <a href="login.html">Já tem uma conta? Entrar</a>
        </div>
        <p class="message" id="msg"></p>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('cadastroForm')
    const msg = document.getElementById('msg')

    //função chamada após envio do formulário
    form.addEventListener('submit', async (e) =>{
        e.preventDefault();

        //obter valores do formulário
        const fullname = form.fullname.value;
        const email = form.email.value;
        const username = form.username.value;
        const password = form.password.value;
        const confirmPassword = form.confirm_password.value;

        //confirmação de senha
        if (password !== confirmPassword) {
            msg.textContent = "As senhas não coindicem.";
            msg.style.color = "yellow";
            return;
        }

        try {
            //envia os dados para a função /cadastrarUser no servidor
            const response = await fetch('/cadastrarUser',{
                //definições de envio dos dados
                method: 'POST',
                headers: {'Content-Type':'application/json' },
                body: JSON.stringify({fullname, email, username, password })
            });

            const data = await response.json();

            //mensagem de sucesso e redirecionamento para login
            if (response.ok){
                msg.textContent = "Conta criada com sucesso! redirecionando para página de login...";
                msg.style.color = "green";

                setTimeout(() => window.location.href = "login.html", 1500);
            }else{
                msg.textContent = (data.error || "Erro ao criar conta.");
                msg.style.color = "red";
            }

        }catch (err) {
            msg.textContent = "Erro de coneão com o servidor.";
            msg.style.color = "red";
        }

    });
  </script>

</body>
</html>
